name: Tests

on:
  pull_request:
  push:
    # Temporarily disabled while the workflow is being built up more.
    # branches:
    #   - master
    #   - develop

permissions:
  contents: read

jobs:
  lint:
    # Temporarily disabled while other parts are being built.
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run eslint
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - run: npm run prepare
      - run: npm run build
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: axe-core
          path: axe.js
          retention-days: 1

  fmt_check:
    # Temporarily disabled while other parts are being built.
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - run: npm run fmt:check

  test_chrome:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    needs: build
    env:
      DISPLAY: :99
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install OS Deps
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb x11-xserver-utils
      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
      - name: Install Dependencies
        run: npm ci
      - name: Install Chromedriver
        run: npx browser-driver-manager install chromedriver --verbose
      - name: Restore axe-core Build Artifact
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: axe-core
      - name: Start Xvfb
        run: Xvfb "$DISPLAY" -screen 0 1280x1024x24 &
      - name: Run Tests Against Chrome
        run: npm run test -- --browsers Chrome
      - name: Run Chrome Integration Tests
        run: npm run test:integration:chrome

  test_firefox:
    runs-on: ubuntu-24.04
