name: Tests

on:
  pull_request:
  push:
    # Temporarily disabled while the workflow is being built up more.
    # branches:
    #   - master
    #   - develop

concurrency:
  group: axe-core Tests ${{ github.ref_name }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

permissions:
  contents: read

env:
  CHROME_DEVEL_SANDBOX: /opt/google/chrome/chrome-sandbox

jobs:
  lint:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run eslint

  fmt_check:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - run: npm run fmt:check

  build:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version-file: .nvmrc
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: &build |
          npm run prepare
          npm run build
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: axe-core
          path: axe.js
          retention-days: 1

  test_chrome:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      DISPLAY: :99
      CHROME_DEVEL_SANDBOX: /opt/google/chrome/chrome-sandbox
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        uses: ./.github/actions/install-deps
        id: install-deps
        with:
          start-xvfb: ${{ env.DISPLAY }}
      - name: Build
        run: &build |
          npm run prepare
          npm run build
      - name: Run Tests Against Chrome
        env:
          CHROME_BIN: ${{ steps.install-deps.outputs.chrome-path }}
          CHROMEDRIVER_BIN: ${{ steps.install-deps.outputs.chromedriver-path }}
        run: npm run test -- --browsers Chrome
      - name: Run Chrome Integration Tests
        env:
          CHROME_BIN: ${{ steps.install-deps.outputs.chrome-path }}
          CHROMEDRIVER_BIN: ${{ steps.install-deps.outputs.chromedriver-path }}
        run: npm run test:integration:chrome

  test_firefox:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      DISPLAY: :99
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        uses: ./.github/actions/install-deps
        id: install-deps
        with:
          start-xvfb: ${{ env.DISPLAY }}
      - name: Build
        run: *build
      - name: Run Tests Against Firefox
        env:
          FIREFOX_BIN: ${{ steps.install-deps.outputs.firefox-path }}
        run: npm run test -- --browsers Firefox
      - name: Run Firefox Integration Tests
        env:
          FIREFOX_BIN: ${{ steps.install-deps.outputs.firefox-path }}
        run: npm run test:integration:firefox

  # Run examples under `doc/examples`
  test_examples:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        uses: ./.github/actions/install-deps
      - name: Build
        run: *build
      - name: Run Tests Against Examples
        run: npm run test:examples

  test_act:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        id: install-deps
        uses: ./.github/actions/install-deps
      - name: Build
        run: *build
      - name: Run ACT Tests
        env:
          CHROME_BIN: ${{ steps.install-deps.outputs.chrome-path }}
          CHROMEDRIVER_BIN: ${{ steps.install-deps.outputs.chromedriver-path }}
        run: npm run test:act

  test_aria_practices:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        id: install-deps
        uses: ./.github/actions/install-deps
      - name: Build
        run: *build
      - name: Run ARIA Practices Tests
        env:
          CHROME_BIN: ${{ steps.install-deps.outputs.chrome-path }}
          CHROMEDRIVER_BIN: ${{ steps.install-deps.outputs.chromedriver-path }}
        run: npm run test:apg

  test_locales:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        uses: ./.github/actions/install-deps
      - name: Build
        run: *build
      - name: Run Locale Tests
        run: npm run test:locales

  test_virtual_rules:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        uses: ./.github/actions/install-deps
      - name: Build
        run: *build
      - name: Run Virtual Rules Tests
        run: npm run test:virtual-rules

  test_jsdom:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        uses: ./.github/actions/install-deps
      - name: Build
        run: *build
      - name: Run jsdom Tests
        run: npm run test:jsdom

  build_api_docs:
    if: ${{ false }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Install Deps
        uses: ./.github/actions/install-deps
      - name: Run API Docs Build
        run: npm run api-docs

  test_node:
    if: ${{ false }}
    # The package can't be built on Node 6 anymore, but should still run there.
    # So we need to pull in a previous build artifact.
    needs: build
    strategy:
      matrix:
        node:
          - 6
          - 18
          - 20
          - 22
          - 24
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - name: Set up Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: ${{ matrix.node }}
      - name: Restore axe build
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: axe-core
      - name: Run Node.js Tests
        run: npm run test:node
