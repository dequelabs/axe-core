# Do not rename this file. The name "deploy.yml" is known to
# npm for trusted OIDC publishing.
name: Deploy

# This workflow has safeguards to prevent exploitation.
# All non-blocked jobs MUST check that the workflow_run event is
# 'push' (i.e., github.event.workflow_run.event == 'push') to prevent
# forked PRs from modifying enough to trigger a deployment by force.
# Forked PRs will only run with 'pull_request' events within our runs.
on: # zizmor: ignore[dangerous-triggers]
  workflow_run:
    workflows:
      - Tests
    types:
      - completed
    branches:
      - master
      - develop

concurrency:
  group: deploy/${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-next:
    name: Deploy "next" to npm
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'develop' && github.event.workflow_run.event == 'push' }}
    environment:
      name: registry.npmjs.org
    permissions:
      contents: read
      id-token: write # Required for OIDC
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.determine-version.outputs.version }}
      packageName: ${{ steps.determine-version.outputs.name }}
    steps:
      - &checkout
        name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false
      - &install-deps
        name: Install Dependencies
        uses: ./.github/actions/install-deps
      - &build
        name: Build
        run: |
          npm run prepare
          npm run build
      - name: Determine prerelease version
        id: determine-version
        run: ./.github/bin/determine-version.sh
      - name: Bump version
        env:
          NEW_VERSION: ${{ steps.determine-version.outputs.version }}
        run: npm version "$NEW_VERSION" --no-git-tag-version
      - &validate-package
        name: Validate package is consumable
        env:
          # Ref: https://docs.github.com/en/actions/reference/workflows-and-actions/contexts#runner-context
          # Linting shows this context might be invalid, but it shouldn't be per docs.
          # Probably something missing in the schema.
          DEBUG: ${{ runner.debug == '1' }}
        run: node .github/bin/validate-package.mjs
      - name: Publish "next" version to npm
        run: npm publish --tag=next
  validate-next-deploy:
    name: Validate Next Deployment
    needs: deploy-next
    if: ${{ needs.deploy-next.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      # No checkout since we want to have a clean environment
      # so we can validate module resolution.
      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          # Perpetually test on the latest local LTS version.
          node-version: lts/*
      # In theory since this is a new job now, by the time
      # this would kick off the package should be available.
      # But, to be safe in case of delays in propagation,
      # we'll implement a retry mechanism.
      - name: Wait for package to be available on npm
        env:
          VERSION: ${{ needs.deploy-next.outputs.version }}
          PACKAGE_NAME: ${{ needs.deploy-next.outputs.packageName }}
          MAX_ATTEMPTS: 30
          SLEEP_SECONDS: 10
        run: |
          echo "::group::Waiting for ${PACKAGE_NAME}@${VERSION} to be available on npm registry..."
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i of $MAX_ATTEMPTS..."
            # Try to get package info from npm registry
            if npm view ${PACKAGE_NAME}@${VERSION} version > /dev/null 2>&1; then
              PUBLISHED_VERSION=$(npm view ${PACKAGE_NAME}@${VERSION} version)
              echo "✓ Package ${PACKAGE_NAME}@${PUBLISHED_VERSION} is now available on npm!"
              echo "::endgroup::"
              exit 0
            fi
            if [ $i -lt $MAX_ATTEMPTS ]; then
              echo "Package not yet available, waiting ${SLEEP_SECONDS} seconds..."
              sleep $SLEEP_SECONDS
            fi
          done
          echo "✗ Timeout: Package ${PACKAGE_NAME}@${VERSION} not available after $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds"
          echo "::endgroup::"
          exit 1
      - name: Install ${{ needs.deploy-next.outputs.packageName }}
        env:
          PACKAGE: ${{ needs.deploy-next.outputs.packageName }}@${{ needs.deploy-next.outputs.version }}
        run: npm install -g "$PACKAGE"
      - name: Verify CJS Import
        env:
          PACKAGE_NAME: ${{ needs.deploy-next.outputs.packageName }}
        shell: bash
        run: |
          node -pe "window={}; document={}; require('${PACKAGE_NAME}');"
      - name: Get global npm root
        id: npm-root
        run: |
          echo "path=$(npm root -g)" >> $GITHUB_OUTPUT
      - name: Verify types are in package
        working-directory: ${{ steps.npm-root.outputs.path }}/${{ needs.deploy-next.outputs.packageName }}
        run: |
          types=$(node -pe "require('./package.json').types")
          if [ "$types" == "undefined" ]
          then
            types=$(node -pe "require('./package.json').typings")
          fi
          if [ "$types" != "undefined" ] && [ ! -f "$types" ]
          then
            echo "::error::The types file is missing"
            exit 1;
          fi
          echo "Types file '$types' is present in the package"
  prod-hold:
    name: Await approval to deploy to production
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master' && github.event.workflow_run.event == 'push' }}
    environment:
      name: production-hold
    runs-on: ubuntu-24.04
    steps:
      - name: Awaiting approval to deploy to production
        run: echo "Approval granted to proceed to production deployment."
  prod-deploy:
    name: Deploy stable to npm
    needs: prod-hold
    if: ${{ needs.prod-hold.result == 'success' }}
    environment:
      name: registry.npmjs.org
    permissions:
      contents: read
      id-token: write # Required for OIDC
    outputs:
      version: ${{ steps.get-data.outputs.version }}
      packageName: ${{ steps.get-data.outputs.name }}
    runs-on: ubuntu-24.04
    steps:
      - *checkout
      - *install-deps
      - *build
      - *validate-package
      - name: Publish stable version to npm
        run: npm publish
      - name: Get published package data
        id: get-data
        run: |
          VERSION=$(npm pkg get version | tr -d '"')
          NAME=$(npm pkg get name | tr -d '"')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "name=$NAME" >> $GITHUB_OUTPUT
  create-github-release:
    name: Create GitHub Release
    needs: prod-deploy
    if: ${{ needs.prod-deploy.result == 'success' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Required to create releases
    steps:
      - *checkout
      - name: Install Release Helper
        run: go install gopkg.in/aktau/github-release.v0@latest
      - name: Download Release Script
        run: curl https://raw.githubusercontent.com/dequelabs/attest-release-scripts/develop/src/node-github-release.sh -s -o ./node-github-release.sh
      - name: Make Release Script Executable
        run: chmod +x ./node-github-release.sh
      - name: Create GitHub Release
        run: ./node-github-release.sh
  validate-deploy:
    name: Validate Deployment
    needs: prod-deploy
    if: ${{ needs.prod-deploy.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      # No checkout since we want to have a clean environment
      # so we can validate module resolution.
      - name: Setup Node.js
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          # Perpetually test on the latest local LTS version.
          node-version: lts/*
      # In theory since this is a new job now, by the time
      # this would kick off the package should be available.
      # But, to be safe in case of delays in propagation,
      # we'll implement a retry mechanism.
      - name: Wait for package to be available on npm
        env:
          VERSION: ${{ needs.prod-deploy.outputs.version }}
          PACKAGE_NAME: ${{ needs.prod-deploy.outputs.packageName }}
          MAX_ATTEMPTS: 30
          SLEEP_SECONDS: 10
        run: |
          echo "::group::Waiting for ${PACKAGE_NAME}@${VERSION} to be available on npm registry..."
          for i in $(seq 1 $MAX_ATTEMPTS); do
            echo "Attempt $i of $MAX_ATTEMPTS..."
            # Try to get package info from npm registry
            if npm view ${PACKAGE_NAME}@${VERSION} version > /dev/null 2>&1; then
              PUBLISHED_VERSION=$(npm view ${PACKAGE_NAME}@${VERSION} version)
              echo "✓ Package ${PACKAGE_NAME}@${PUBLISHED_VERSION} is now available on npm!"
              echo "::endgroup::"
              exit 0
            fi
            if [ $i -lt $MAX_ATTEMPTS ]; then
              echo "Package not yet available, waiting ${SLEEP_SECONDS} seconds..."
              sleep $SLEEP_SECONDS
            fi
          done
          echo "✗ Timeout: Package ${PACKAGE_NAME}@${VERSION} not available after $((MAX_ATTEMPTS * SLEEP_SECONDS)) seconds"
          echo "::endgroup::"
          exit 1
      - name: Install ${{ needs.prod-deploy.outputs.packageName }}
        env:
          PACKAGE: ${{ needs.prod-deploy.outputs.packageName }}@${{ needs.prod-deploy.outputs.version }}
        run: npm install -g "$PACKAGE"
      - name: Verify CJS Import
        env:
          PACKAGE_NAME: ${{ needs.prod-deploy.outputs.packageName }}
        shell: bash
        run: |
          node -pe "window={}; document={}; require('${PACKAGE_NAME}');"
      - name: Get global npm root
        id: npm-root
        run: |
          echo "path=$(npm root -g)" >> $GITHUB_OUTPUT
      - name: Verify types are in package
        working-directory: ${{ steps.npm-root.outputs.path }}/${{ needs.prod-deploy.outputs.packageName }}
        run: |
          types=$(node -pe "require('./package.json').types")
          if [ "$types" == "undefined" ]
          then
            types=$(node -pe "require('./package.json').typings")
          fi
          if [ "$types" != "undefined" ] && [ ! -f "$types" ]
          then
            echo "::error::The types file is missing"
            exit 1;
          fi
          echo "Types file '$types' is present in the package"
