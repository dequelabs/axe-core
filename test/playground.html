function generateFrequency(nodes) {
  const ret = {};

  nodes.forEach(node => {
    // count the tag
    const tag = node.nodeName;
    if (node.id) {
      ret[`#${node.id}`] ??= [];
      ret[`#${node.id}`].push(node);
    }

    // count all the classes
    if (node.classList) {
      Array.from(node.classList).forEach(cl => {
        const ind = escapeSelector(cl);
        ret[`.${ind}`] ??= [];
        ret[`.${ind}`].push(node);
      });
    }

    // count all the filtered attributes
    if (node.hasAttributes()) {
      Array.from(node.attributes)
        .filter(filterAttributes)
        .forEach(at => {
          const atnv = getAttributeNameValue(node, at);
          if (atnv) {
            ret[`[${atnv}]`] ??= [];
            ret[`[${atnv}]`].push(node);
          }
        });
    }
  });

  return ret;
}

function leastFrequent(node, freqList) {
  let selector = node.nodeName.toLowerCase();

  // unique by default
  if (selector === 'body' || selector === 'html') {
    return {
      selector,
      unique: true
    }
  }

  const values = freqList.get(node);
  let freq = axe._selectorData.otherFreq[node.nodeName];
  let min = Infinity;

  while (min > 1) {
    let group;
    let value = '';
    for (let i = 0; i < values.length; i++) {
      const count = freq[ values[i] ].size
      if (count < min) {
        min = count;
        value = values[i];
        group = freq[ values[i] ];
      }
    }

    selector += value;

    // TODO: does 1 more path
    if (!group) {
      return {
        selector,
        unique: false
      };
    }

    if (min > 1) {
      const newFreq = {}
      for (let i = 0; i < values.length; i++) {
        if (values[i] === value) {
          newFreq[ values[i] ] = freq[ values[i] ]
        }
        else {
          newFreq[ values[i] ] = freq[ values[i] ].intersection( freq[value] )
        }
      }
      freq = newFreq;
    }
  }

  return {
    selector,
    unique: true
  };
}
